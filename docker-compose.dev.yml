services:
  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: agenthive-frontend
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      target: dev
    container_name: agenthive-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started

  worker:
    build:
      context: ./backend
      target: dev
    container_name: agenthive-worker
    command: watchmedo auto-restart --directory=/app --pattern=*.py --recursive -- celery -A app.jobs.worker worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
      - postgres

  scheduler:
    build:
      context: ./backend
      target: dev
    container_name: agenthive-scheduler
    command: celery -A app.jobs.worker beat --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - postgres

volumes:
  frontend_node_modules:
